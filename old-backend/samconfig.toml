version = 0.1

[default.global.parameters]
stack_name = "remote-falcon-proxy-dev"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
s3_prefix = "remote-falcon-proxy"
region = "us-east-2"
image_repositories = []
parameter_overrides = [
    "AllowedOrigins=https://doghouselights.com,https://*.doghouselights.com,http://127.0.0.1:*,http://localhost:*",
    "Environment=dev"
]