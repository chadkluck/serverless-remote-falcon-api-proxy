openapi: '3.0.0'
info:
  title: "Remote Falcon Proxy API"
  description: "Proxy API for Remote Falcon endpoints and telemetry"
  version: "1.0"
  contact:
    name: "63Klabs"
    url: "https://github.com/63klabs"
  license:
    name: "CC Attribution-ShareAlike 4.0 (CC BY-SA 4.0)"
    url: "https://creativecommons.org/licenses/by-sa/4.0/"

# =============================================================================

paths:

  /telemetry:
    post:
      description: "Receive and log telemetry events from frontend"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackingData'
      responses:
        '200':
          description: "Tracking data received"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetrySuccess'
        '400':
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: "Server error"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations
    options:
      description: "CORS preflight for telemetry"
      responses:
        '200':
          description: "CORS preflight response"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations

  /proxy/showDetails:
    get:
      description: "Proxy GET request to Remote Falcon showDetails"
      responses:
        '200':
          description: "Show details from Remote Falcon"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations

  /proxy/addSequenceToQueue:
    post:
      description: "Proxy POST request to Remote Falcon addSequenceToQueue"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: "Sequence added"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations

  /proxy/voteForSequence:
    post:
      description: "Proxy POST request to Remote Falcon voteForSequence"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: "Vote recorded"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations

  /proxy/{proxy+}:
    x-amazon-apigateway-any-method:
      description: "Catch-all proxy to Remote Falcon API"
      parameters:
        - name: proxy
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Proxied response"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations
    options:
      description: "CORS preflight for proxy paths"
      parameters:
        - name: proxy
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "CORS preflight response"
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations

# =============================================================================

components:

  # ---------------------------------------------------------------------------

  schemas:

    TrackingData:
      type: object
      required:
        - eventType
        - url
      properties:
        eventType:
          type: string
          enum:
            - pageView
            - click
            - videoPlay
            - songRequest
            - systemHealth
            - systemAlert
            - eventFailure
          description: "Type of telemetry event"
        url:
          type: string
          format: uri
          description: "URL where the event occurred"
        eventData:
          type: object
          description: "Additional event-specific data"

    TelemetrySuccess:
      type: object
      properties:
        message:
          type: string
          description: "Success message"
        timestamp:
          type: string
          format: date-time
          description: "Server timestamp"
        processingTime:
          type: number
          description: "Processing time in milliseconds"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: "Error message"
        error:
          type: string
          description: "Error code"
        requestId:
          type: string
          description: "Lambda request ID"
        timestamp:
          type: string
          format: date-time
          description: "Server timestamp"
